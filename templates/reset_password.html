{% extends "base.html" %}
{% block title %}Set New Password — Rally Point{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-logo">
    <h1>Rally Point</h1>
    <p>Set a new password</p>
  </div>
  <div class="card">
    <form method="POST" action="/auth/reset" id="resetForm">
      <!-- Token is extracted from the URL hash by JS below -->
      <input type="hidden" name="token" id="tokenField">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" name="new_password" class="form-control" minlength="8" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input type="password" name="confirm_password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Update Password</button>
    </form>
    <div id="noToken" style="display:none; text-align:center; color:var(--muted); font-size:14px; padding-top:8px;">
      This link appears invalid or expired.
      <a href="/auth/forgot">Request a new one.</a>
    </div>
  </div>
</div>

<script>
  // Supabase puts the recovery token in the URL fragment, e.g.:
  // /auth/reset#access_token=xxx&type=recovery
  // We extract it and populate the hidden field before form submission.
  (function () {
    const hash   = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const token  = params.get('access_token');
    const type   = params.get('type');

    if (token && type === 'recovery') {
      document.getElementById('tokenField').value = token;
    } else {
      // No valid token — hide form, show error message
      document.getElementById('resetForm').style.display = 'none';
      document.getElementById('noToken').style.display   = 'block';
    }
  })();
</script>
{% endblock %}
