{% extends "base.html" %}
{% block title %}Log In — Rally Point{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-logo">
    <h1>Rally Point</h1>
    <p>Welcome back</p>
  </div>
  <div class="card">
    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" value="{{ email or '' }}" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Log In</button>
    </form>
  </div>
  <p style="text-align:center; margin-top:16px; color:var(--muted); font-size:14px;">
    Don't have an account? <a href="/signup">Sign up free</a>
  </p>
</div>
{% endblock %}
